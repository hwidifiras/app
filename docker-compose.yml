services:
  postgres:
    image: postgres:16-alpine
    container_name: dojo-saas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gymday}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-gymday_prod}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gymday} -d ${POSTGRES_DB:-gymday_prod}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - dojo_postgres:/var/lib/postgresql/data

  dojo-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dojo-saas-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - path: .env.production
        required: false
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-gymday}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-gymday_prod}?schema=public
      NODE_ENV: production
      PORT: 3000
      SAAS_ROOT_DOMAIN: ${SAAS_ROOT_DOMAIN:-we-discipline.com}
      DEFAULT_TENANT_SLUG: ${DEFAULT_TENANT_SLUG:-we-discipline}
    ports:
      - "127.0.0.1:${HOST_PORT:-3000}:3000"
    volumes:
      - dojo_branding:/app/public/branding

volumes:
  dojo_postgres:
  dojo_branding:
