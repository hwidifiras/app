services:
  dojo-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dojo-saas-app
    restart: unless-stopped
    env_file:
      - path: .env.production
        required: false
    environment:
      DATABASE_URL: file:/app/data/prod.db
      NODE_ENV: production
      PORT: 3000
    ports:
      - "127.0.0.1:${HOST_PORT:-3000}:3000"
    volumes:
      - dojo_data:/app/data
      - dojo_branding:/app/public/branding

volumes:
  dojo_data:
  dojo_branding:
